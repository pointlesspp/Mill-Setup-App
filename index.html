<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test App</title>
</head>
<body>
  <h1>Test App</h1>

  <input type="text" id="mainCategoryName" placeholder="New main category" />
  <button id="addMainCategoryBtn">Add Main Category</button>

  <ul id="mainCategoryList"></ul>

  <script>
    let data = {};

    const mainCategoryNameInput = document.getElementById("mainCategoryName");
    const addMainCategoryBtn = document.getElementById("addMainCategoryBtn");
    const mainCategoryList = document.getElementById("mainCategoryList");

    function renderMainCategories() {
      mainCategoryList.innerHTML = "";

      Object.keys(data).forEach(name => {
        const li = document.createElement("li");
        li.textContent = name;
        mainCategoryList.appendChild(li);
      });
    }

    addMainCategoryBtn.addEventListener("click", () => {
      alert("Button clicked");

      const name = mainCategoryNameInput.value.trim();
      if (!name) {
        alert("No name entered");
        return;
      }

      data[name] = {};
      mainCategoryNameInput.value = "";
      renderMainCategories();
    });
  </script>
</body>
</html>
